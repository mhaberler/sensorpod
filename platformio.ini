; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = m5stack-nanoc6

[ci]
envs = 
	m5stack-nanoc6-m5unified
	m5stack-stamps3-m5unified
	m5stack-atoms3-u-m5unified
	m5stack-cores3-m5unified
	m5stack-tab5-m5unified
	esp32p4_waveshare_devkit
	seed-xiao-c6
	esp32-c5-devkitc1-n16r8

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
platform_packages = 
framework = arduino
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.mcu = esp32
board_build.flash_mode = dio
monitor_speed = 115200
upload_speed = 1500000
build_flags = 
	-w
	-O2 -g
	-fno-exceptions -fno-unwind-tables -fno-asynchronous-unwind-tables
	-DAPP_NAME=\"Sensorpod\"
	-DPICOWEBSOCKET_MAX_HTTP_LINE_LENGTH=512
	-DARDUINO_LOOP_STACK_SIZE=16384
	-DMQTT_PORT=1883
	-DMQTTWS_PORT=8080
lib_deps = 
	https://github.com/bblanchon/ArduinoJson.git
	https://github.com/mathertel/OneButton.git
	https://github.com/mhaberler/Improv-WiFi-Library.git
	https://github.com/adafruit/Adafruit_VL53L0X.git
	https://github.com/mlesniew/PicoMQTT
	https://github.com/mlesniew/PicoWebsocket
	https://github.com/mhaberler/BTHomeDecoder#arduino-lib
	; TheengsDecoder accelerate branch (local) — match-path cache/buckets
	https://github.com/mhaberler/decoder#accelerate
	file://../../networking/MycilaLogger
	https://github.com/mhaberler/MycilaWebSerial.git
lib_ldf_mode = deep
extra_scripts = 
	pre:scripts/inject_build_info.py
	scripts/inject_lib_versions.py
	post:scripts/generate_merged_firmware.py
	post:scripts/bump_version.py
custom_inject_lib_versions = "Improv WiFi Library" OneButton ArduinoJson Adafruit_VL53L0X \
	PicoMQTT PicoWebsocket TheengsDecoder BTHomeDecoder
custom_firmware_dir = firmware

[ghota]
build_flags = 

[improv]
build_flags = 
	-DIMPROV_WIFI_BLE_ENABLED

[ota]
build_flags = 

; Broker per-client connection registry (sysinfo listing). RAM ≈
; MAX_CLIENTS * (client_id + topics*TOPIC_LEN). Set TRACK=0 on tight boards.
[mqtt-conn-track]
build_flags =
	-DMQTT_CONN_TRACK=1
	-DMQTT_CONN_MAX_CLIENTS=8
	-DMQTT_CONN_MAX_TOPICS=16
	-DMQTT_CONN_TOPIC_LEN=64

[build-target]
extends = debug

[release]
build_type = release
build_flags = 
	${env.build_flags}
	${improv.build_flags}
	${ghota.build_flags}
	${ota.build_flags}
	${mqtt-conn-track.build_flags}
	${env.build_flags}
	-DCORE_DEBUG_LEVEL=2

[debug]
build_type = debug
build_flags = 
	${env.build_flags}
	${improv.build_flags}
	${ghota.build_flags}
	${ota.build_flags}
	${mqtt-conn-track.build_flags}
	-DCORE_DEBUG_LEVEL=4 -g  -DDEBUG

[module-llm]
build_flags = 
	${env.build_flags}
	-DUSE_MODULE_LLM
lib_deps = 
	M5Module-LLM

[env:m5stack-basic]
extends = m5stack-basic-16MB, build-target
build_flags = 
	${m5stack-basic-16MB.build_flags}
	${build-target.build_flags}
	-DUSE_M5STACK_OFFICIAL
lib_deps = 
	${env.lib_deps}
	${m5stack-basic-16MB.lib_deps}
